<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon TCG 3D - QR Markers</title>
    <style>
      :root {
        --marker-size-mm: 40;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        background: #0f172a;
        color: #e2e8f0;
      }

      .toolbar button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 600;
        background: #22c55e;
        color: #052e16;
      }

      .sheet {
        box-sizing: border-box;
        width: 210mm;
        min-height: 297mm;
        margin: 0 auto;
        padding: 14mm;
        background: #fff;
      }

      .title {
        margin: 0 0 4mm;
        font-size: 18px;
      }

      .hint {
        margin: 0 0 10mm;
        font-size: 12px;
        color: #334155;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16mm;
      }

      .marker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2mm;
      }

      .marker-label {
        font-weight: 700;
        font-size: 14px;
      }

      .marker-box {
        width: calc(var(--marker-size-mm) * 1mm);
        height: calc(var(--marker-size-mm) * 1mm);
        border: 1px dashed #64748b;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .marker-qr {
        width: 100%;
        height: 100%;
      }

      .marker-qr canvas,
      .marker-qr img {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .place {
        font-size: 12px;
        color: #475569;
      }

      @media print {
        .toolbar {
          display: none;
        }

        body {
          background: #fff;
        }

        .sheet {
          margin: 0;
          padding: 10mm;
          width: auto;
          min-height: auto;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <button id="print-btn" type="button">Imprimer</button>
      <span>Imprime a 100% (sans "Ajuster a la page").</span>
    </div>

    <main class="sheet">
      <h1 class="title">Pokemon TCG 3D - QR de calibration</h1>
      <p class="hint">
        Decoupe les 4 QR puis place-les aux coins du playmat:
        TL (haut gauche), TR (haut droit), BR (bas droit), BL (bas gauche).
      </p>

      <section class="grid">
        <article class="marker">
          <div class="marker-label">TL</div>
          <div class="marker-box"><div class="marker-qr" id="qr-tl"></div></div>
          <div class="place">Haut gauche</div>
        </article>
        <article class="marker">
          <div class="marker-label">TR</div>
          <div class="marker-box"><div class="marker-qr" id="qr-tr"></div></div>
          <div class="place">Haut droit</div>
        </article>
        <article class="marker">
          <div class="marker-label">BL</div>
          <div class="marker-box"><div class="marker-qr" id="qr-bl"></div></div>
          <div class="place">Bas gauche</div>
        </article>
        <article class="marker">
          <div class="marker-label">BR</div>
          <div class="marker-box"><div class="marker-qr" id="qr-br"></div></div>
          <div class="place">Bas droit</div>
        </article>
      </section>
    </main>

    <script>
      const MARKER_PX = 360;
      const defs = [
        { id: "qr-tl", text: "TL" },
        { id: "qr-tr", text: "TR" },
        { id: "qr-bl", text: "BL" },
        { id: "qr-br", text: "BR" },
      ];

      defs.forEach((m) => {
        new QRCode(document.getElementById(m.id), {
          text: m.text,
          width: MARKER_PX,
          height: MARKER_PX,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M,
        });
      });

      document.getElementById("print-btn").addEventListener("click", () => {
        window.print();
      });
    </script>
  </body>
</html>
